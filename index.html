<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&C Coach Auto-Carousel PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3d5a4b', secondary: '#c59d5f', bglight: '#fdfbf7' },
                    fontFamily: { serif: ['"Noto Serif TC"', 'serif'], sans: ['"Noto Sans TC"', 'sans-serif'] }
                }
            }
        }
        const ACCESS_PASSWORD = "7788999"; 
    </script>
    <style>
        body { background-color: #e2e8f0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
        
        #poster-card { width: 720px; min-height: 900px; background-color: #fdfbf7; position: relative; flex-shrink: 0; overflow: hidden; display: flex; flex-direction: column; }
        
        .bg-orb-top { position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; background: #f4efe6; border-radius: 50%; z-index: 0; }
        .bg-orb-bottom { position: absolute; bottom: 100px; left: -100px; width: 300px; height: 300px; background: #eff2ee; border-radius: 50%; z-index: 0; }

        #out-title, #main-rows, #quote-box { transition: all 0.3s ease-in-out; }

        @media (max-width: 768px) { 
            #poster-card { transform: scale(0.5); transform-origin: top center; margin-bottom: -450px; } 
            .editor-container { width: 95% !important; } 
        }
        
        #auth-overlay { position: fixed; inset: 0; background: #3d5a4b; z-index: 99999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="text-center p-8 bg-white/10 backdrop-blur-2xl rounded-[3rem] border border-white/20 shadow-2xl w-[90%] max-w-[420px]">
            <div class="mb-4 text-secondary flex justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h2 class="text-2xl font-black mb-1 font-serif text-white tracking-widest uppercase italic">Coach's Vault</h2>
            <p class="text-white/50 text-[10px] mb-6 tracking-[0.4em] uppercase">Smart Layout Edition v9.2</p>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="text-white/70 text-[10px] uppercase tracking-widest mb-1 block text-left pl-2">API Key (自動存於本機)</label>
                    <input id="api-key-input" type="password" class="w-full p-4 rounded-xl bg-white/90 text-primary outline-none font-mono text-xs shadow-inner" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="text-white/70 text-[10px] uppercase tracking-widest mb-1 block text-left pl-2">System Password</label>
                    <input id="auth-input" type="password" onkeydown="if(event.key==='Enter') checkAuth()" class="w-full p-4 rounded-xl bg-white text-primary outline-none text-center font-bold tracking-[0.5em] text-xl shadow-inner" placeholder="•••••••">
                </div>
            </div>
            
            <button onclick="checkAuth()" class="w-full bg-secondary text-white py-4 rounded-2xl font-black text-xl shadow-xl hover:brightness-110 active:scale-95 transition-all">解鎖系統</button>
        </div>
    </div>

    <div class="editor-container mt-10 mb-10 w-full max-w-[720px] bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-primary p-5 text-white flex justify-between items-center cursor-pointer" onclick="toggleEditor()">
            <h2 class="font-bold flex items-center gap-2 text-sm italic tracking-widest uppercase">📚 智慧排版自動連載引擎</h2>
            <span class="text-[10px] px-3 py-1 bg-white/10 rounded-full border border-white/20 uppercase tracking-widest">Collapse</span>
        </div>
        
        <div id="editor-body" class="p-8 space-y-6">
            
            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-2">🤖 AI 引擎即時切換 (動態抓取中)</label>
                <select id="curated-model-select" class="w-full p-3 rounded-xl border border-gray-200 bg-white text-primary outline-none text-xs font-bold shadow-sm cursor-pointer transition-all focus:border-secondary" onchange="saveModelPref()">
                    <option value="">解鎖後自動載入可用模型...</option>
                </select>
            </div>

            <div class="bg-primary/[0.03] p-6 rounded-[2rem] border border-primary/10">
                <div class="flex justify-between items-center mb-3">
                    <label class="text-[10px] font-bold text-primary/40 uppercase tracking-[0.3em] block">自動排版：封面 ➔ 內容 ➔ 金句</label>
                    <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-lg border border-primary/10 shadow-sm">
                        <label class="text-[10px] font-bold text-primary/70 tracking-widest">產出總頁數</label>
                        <input id="ai-target-pages" type="number" min="3" max="15" value="5" class="w-10 text-center font-black text-secondary outline-none bg-transparent">
                    </div>
                </div>
                <textarea id="ai-raw-input" rows="3" class="w-full p-4 border-2 border-dashed border-primary/20 rounded-2xl outline-none focus:border-secondary text-sm bg-white" placeholder="貼上訓練科學文獻..."></textarea>
                <button id="ai-btn" onclick="callRealAI()" class="w-full mt-3 bg-primary text-white py-4 rounded-xl font-bold text-xs hover:bg-primary/90 transition-all shadow-lg flex items-center justify-center gap-2">
                    <span id="ai-btn-text">🪄 啟動 AI 智慧排版萃取</span>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gray-50/50 p-4 rounded-2xl border border-gray-100 relative overflow-hidden">
                    <div id="ai-mode-badge" class="absolute top-0 right-0 bg-secondary text-white text-[9px] px-2 py-1 font-black tracking-widest hidden">AI 智慧排版中</div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Slide / Total</label>
                    <div class="flex items-center gap-3">
                        <input id="in-curr-page" type="number" oninput="sync()" class="w-12 border-b-2 border-primary/20 bg-transparent text-center font-black text-primary text-xl" value="1">
                        <span class="text-gray-300 font-bold">/</span>
                        <input id="in-total-page" type="number" oninput="sync()" class="w-12 border-b-2 border-gray-200 bg-transparent text-center font-black text-gray-400 text-xl" value="1">
                    </div>
                </div>
                <div class="bg-gray-50/50 p-4 rounded-2xl border border-gray-100">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Series Volume</label>
                        <label class="flex items-center gap-1 cursor-pointer">
                            <input type="checkbox" id="show-vol-toggle" checked onchange="sync()" class="accent-secondary w-3 h-3">
                            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-wider mt-0.5">顯示</span>
                        </label>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-secondary font-black text-sm uppercase">VOL.</span>
                        <input id="in-no-num" type="number" oninput="sync()" class="w-full border-b-2 border-secondary/20 bg-transparent text-center font-black text-secondary text-xl" value="1">
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input id="in-tag" type="text" oninput="sync()" class="p-4 border border-gray-100 rounded-2xl text-xs font-black text-primary uppercase tracking-widest bg-gray-50/30" placeholder="分類 (如: GOLF BIOMECHANICS)">
                    <input id="in-ig" type="text" oninput="sync()" class="p-4 border border-gray-100 rounded-2xl text-xs text-secondary font-black tracking-widest bg-gray-50/30" value="@JoeYou501">
                </div>
                <input id="in-title" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl focus:border-secondary font-serif font-black text-base" placeholder="標題 (若只填此欄將顯示為封面)">
                <input id="in-p1" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs" placeholder="重點1|內容描述 (有內容則顯示白卡排版)">
                <input id="in-p2" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs" placeholder="重點2|內容描述">
                <input id="in-p3" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs" placeholder="重點3|內容描述">
                <input id="in-quote" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs italic font-serif" placeholder="專屬金句 (封面不顯示，內容/結尾顯示)">
            </div>

            <div class="flex gap-3 w-full">
                <button onclick="prevPage()" class="flex-1 bg-gray-100 text-gray-500 py-4 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-gray-200 transition-all">上一頁</button>
                <button onclick="downloadImage()" class="flex-1 bg-primary text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl active:scale-95 transition-all">儲存本頁</button>
                <button onclick="nextPage()" class="flex-1 bg-secondary text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-secondary/30 active:scale-95 transition-all">下一頁</button>
            </div>
        </div>
    </div>

    <div id="poster-card" class="p-12 flex flex-col border-t-0">
        
        <div class="bg-orb-top"></div>
        <div class="bg-orb-bottom"></div>

        <header class="mb-6 relative z-10 w-full flex justify-between items-start">
            <div class="flex items-start gap-3 flex-shrink-0">
                <div class="w-1 h-10 bg-secondary mt-1 flex-shrink-0"></div>
                <div class="flex flex-col whitespace-nowrap">
                    <span class="font-sans text-secondary tracking-[0.2em] text-[13px] font-black uppercase mb-1">S&C SCIENCE</span>
                    <span id="out-tag" class="font-serif text-primary tracking-widest text-[22px] font-bold uppercase leading-none max-w-[400px] overflow-hidden text-ellipsis">分類標籤</span>
                </div>
            </div>
            <div id="out-no-container" class="font-sans text-primary/30 text-[12px] font-black tracking-widest uppercase italic mt-1 pr-2 flex-shrink-0 whitespace-nowrap text-right">
                VOL. <span id="out-no">01</span>
            </div>
        </header>

        <div id="dynamic-content-area" class="flex-grow flex flex-col w-full relative z-10">
            
            <h1 id="out-title" class="font-serif text-primary text-[42px] font-black leading-[1.25] tracking-tight px-1 break-words">等待內容...</h1>
            <div id="title-line" class="w-[98%] h-[1px] bg-primary/10 mt-6 mb-6 mx-auto flex-shrink-0"></div>
            
            <div id="main-rows" class="w-full space-y-6 flex-col justify-center mb-6">
                <div id="row1" class="flex items-start gap-4 w-full"> 
                    <div class="flex-shrink-0 mt-2">
                        <div class="w-8 h-8 rounded-md bg-secondary text-white font-black flex items-center justify-center text-[18px] shadow-md">1</div>
                    </div> 
                    <div class="bg-white rounded-2xl p-6 w-full shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-primary/5"> 
                        <h3 id="out-p1t" class="font-serif text-[22px] font-bold text-primary mb-2"></h3> 
                        <p id="out-p1c" class="font-sans text-primary/70 text-[16px] leading-relaxed"></p> 
                    </div> 
                </div>

                <div id="row2" class="flex items-start gap-4 w-full"> 
                    <div class="flex-shrink-0 mt-2">
                        <div class="w-8 h-8 rounded-md bg-secondary text-white font-black flex items-center justify-center text-[18px] shadow-md">2</div>
                    </div> 
                    <div class="bg-white rounded-2xl p-6 w-full shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-primary/5"> 
                        <h3 id="out-p2t" class="font-serif text-[22px] font-bold text-primary mb-2"></h3> 
                        <p id="out-p2c" class="font-sans text-primary/70 text-[16px] leading-relaxed"></p> 
                    </div> 
                </div>

                <div id="row3" class="flex items-start gap-4 w-full"> 
                    <div class="flex-shrink-0 mt-2">
                        <div class="w-8 h-8 rounded-md bg-secondary text-white font-black flex items-center justify-center text-[18px] shadow-md">3</div>
                    </div> 
                    <div class="bg-white rounded-2xl p-6 w-full shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-primary/5"> 
                        <h3 id="out-p3t" class="font-serif text-[22px] font-bold text-primary mb-2"></h3> 
                        <p id="out-p3c" class="font-sans text-primary/70 text-[16px] leading-relaxed"></p> 
                    </div> 
                </div>
            </div>

            <div id="quote-box" class="w-full bg-primary rounded-3xl p-8 shadow-2xl flex items-center justify-center text-center mt-auto hidden">
                <p id="out-quote" class="font-serif text-white text-[20px] italic leading-[1.6] tracking-wide"></p>
            </div>
            
        </div>
        
        <footer class="mt-6 flex justify-between items-end relative z-10 border-t border-primary/10 pt-4 flex-shrink-0 w-full">
            <div class="flex items-center gap-3 flex-shrink-0">
                <span class="font-sans text-primary/30 text-[12px] font-black tracking-widest uppercase"></span>
                <span id="page-indicator" class="bg-primary/5 text-primary text-[10px] font-black px-2 py-1 rounded tracking-widest whitespace-nowrap">1 / 1</span>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c59d5f" stroke-width="2.5" class="mb-[2px] flex-shrink-0"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line></svg>
                <div class="font-serif text-secondary text-[22px] font-bold tracking-widest whitespace-nowrap" id="out-ig">JoeYou501</div>
            </div>
        </footer>
    </div>

    <script>
        let aiSlidesData = [];
        let currentAiIndex = 0;

        window.onload = function() {
            document.getElementById('in-no-num').value = localStorage.getItem('sc_last_no') || 1;
            document.getElementById('in-ig').value = localStorage.getItem('sc_last_ig') || "JoeYou501";
            document.getElementById('api-key-input').value = localStorage.getItem('sc_api_key') || "";
        };

        async function checkAuth() {
            const pwdInput = document.getElementById('auth-input');
            const keyInput = document.getElementById('api-key-input');
            
            if (!pwdInput || !keyInput) return;
            
            if (pwdInput.value.trim() === ACCESS_PASSWORD) {
                const keyVal = keyInput.value.trim();
                if (!keyVal.startsWith("AIza")) return alert("請輸入有效的 Gemini API Key！");
                
                localStorage.setItem('sc_api_key', keyVal);
                
                const overlay = document.getElementById('auth-overlay');
                if (overlay) overlay.remove(); 
                
                await fetchValidModels(keyVal);
                sync();
            } else {
                alert("解鎖密碼錯誤");
                pwdInput.value = "";
            }
        }

        async function fetchValidModels(apiKey) {
            const selectEl = document.getElementById('curated-model-select');
            selectEl.innerHTML = '<option value="">正在為您尋找可用模型...</option>';
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await response.json();
                
                if (!response.ok) throw new Error("無法連線 Google 伺服器");

                selectEl.innerHTML = '';
                let hasModel = false;
                
                data.models.forEach(model => {
                    if (model.supportedGenerationMethods && model.supportedGenerationMethods.includes("generateContent")) {
                        const pureName = model.name.replace('models/', '');
                        const option = document.createElement('option');
                        option.value = pureName;
                        option.innerText = `${model.displayName} (${pureName})`;
                        
                        if (pureName.includes('lite')) {
                            option.selected = true;
                        } else if (pureName.includes('flash') && !selectEl.options[selectEl.selectedIndex]?.value?.includes('lite')) {
                            option.selected = true;
                        }
                        
                        selectEl.appendChild(option);
                        hasModel = true;
                    }
                });

                if (!hasModel) {
                    selectEl.innerHTML = '<option value="">這把 API Key 沒有任何可用模型</option>';
                } else {
                    const savedModel = localStorage.getItem('sc_curated_model');
                    if (savedModel && selectEl.querySelector(`option[value="${savedModel}"]`)) {
                        selectEl.value = savedModel;
                    }
                }
            } catch (err) {
                selectEl.innerHTML = '<option value="">獲取模型失敗，請檢查網路連線</option>';
                console.error(err);
            }
        }

        function saveModelPref() {
            localStorage.setItem('sc_curated_model', document.getElementById('curated-model-select').value);
        }

        function toggleEditor() {
            document.getElementById('editor-body').classList.toggle('hidden');
        }

        async function callRealAI() {
            const raw = document.getElementById('ai-raw-input').value;
            const targetPages = document.getElementById('ai-target-pages').value || 5; 
            
            if (!raw) return alert("請貼上文字內容");
            if (targetPages < 3) return alert("總頁數至少需要 3 頁 (封面+內容+結尾)！");
            
            const savedApiKey = localStorage.getItem('sc_api_key');
            const selectedModel = document.getElementById('curated-model-select').value;
            if (!savedApiKey) return alert("找不到 API Key，請重新整理頁面。");
            if (!selectedModel) return alert("雷達尚未掃描完畢，請稍候！");
            
            const btn = document.getElementById('ai-btn');
            const btnText = document.getElementById('ai-btn-text');
            btn.disabled = true; 
            btnText.innerText = `🚀 正在呼叫 ${selectedModel}...`;

            // ✨ 修改：強制第 1 頁 (封面) 的 quote 留空 ""
            const prompt = `請以「專業肌力與體能教練 (S&C Coach)，同時具備高爾夫專項體能背景」的角度，將以下長篇文字拆解成一組正好 ${targetPages} 頁的「IG 多頁滑動貼文」。
            請以 JSON 格式回應，不要包含 Markdown 標記。
            【嚴格版面結構規定】：
            1. 第 1 頁 (封面)：必須是視覺封面。填寫 title (吸睛大標題)，points 必須為空陣列 []，且 quote 必須留空 ""。
            2. 第 2 到 ${targetPages - 1} 頁 (內容)：知識乾貨。填寫 title (該頁副標題)，並且「每一頁都必須精準萃取 3 個重點」放入 points。重點格式絕對要用直線符號 "|" 隔開，禁止使用冒號。並在 quote 放入該頁專屬的重點金句。
            3. 第 ${targetPages} 頁 (結語)：總結與行動呼籲。title 留空 ""，points 必須為空陣列 []，並在 quote 填寫震撼的總結金句。
            4. 語言限制：所有內容必須絕對使用繁體中文。

            結構範例：
            {"slides": [
                {"title": "封面大標題", "points": [], "quote": ""},
                {"title": "內容副標題", "points": ["重點一|內文", "重點二|內文", "重點三|內文"], "quote": "本頁重點金句"},
                {"title": "", "points": [], "quote": "結語震撼金句內容"}
            ]}
            輸入長文：\n${raw}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${savedApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const data = await response.json();
                if (!response.ok) {
                    if (response.status === 503) {
                        throw new Error(`Google 伺服器目前當機或超載中 (503)，請稍後再試！`);
                    } else if (response.status === 429) {
                        throw new Error(`額度用盡或頻率過高 (429)，請稍等 1 分鐘，或換一個引擎！`);
                    } else {
                        throw new Error(`伺服器錯誤 [${response.status}]: ${data.error?.message || '未知錯誤'}`);
                    }
                }
                
                const rawText = data.candidates[0].content.parts[0].text;
                const result = JSON.parse(rawText.match(/\{[\s\S]*\}/)[0]); 
                
                aiSlidesData = result.slides;
                currentAiIndex = 0;
                document.getElementById('in-total-page').value = aiSlidesData.length;
                document.getElementById('ai-mode-badge').classList.remove('hidden');

                loadSlideToUI(currentAiIndex);
                alert(`✨ 成功！為您排版成了 ${aiSlidesData.length} 頁 (封面+內容+結尾)。`);

            } catch (err) {
                alert(`❌ 解析失敗：\n\n${err.message}`);
            } finally {
                btn.disabled = false; 
                btnText.innerText = "🪄 啟動 AI 智慧排版萃取";
            }
        }

        function loadSlideToUI(index) {
            const slide = aiSlidesData[index];
            if (!slide) return;
            
            document.getElementById('in-curr-page').value = index + 1;
            document.getElementById('in-title').value = slide.title || "";
            document.getElementById('in-p1').value = slide.points?.[0] || "";
            document.getElementById('in-p2').value = slide.points?.[1] || "";
            document.getElementById('in-p3').value = slide.points?.[2] || "";
            document.getElementById('in-quote').value = slide.quote || "";
            sync();
        }

        function sync() {
            document.getElementById('page-indicator').innerText = `${document.getElementById('in-curr-page').value} / ${document.getElementById('in-total-page').value}`;
            document.getElementById('out-tag').innerText = document.getElementById('in-tag').value || "GOLF BIOMECHANICS";
            
            const igAccount = document.getElementById('in-ig').value;
            document.getElementById('out-ig').innerText = igAccount;
            localStorage.setItem('sc_last_ig', igAccount); 

            const showVol = document.getElementById('show-vol-toggle').checked;
            const volContainer = document.getElementById('out-no-container');
            if (showVol) {
                volContainer.style.display = "block";
                document.getElementById('out-no').innerText = document.getElementById('in-no-num').value.toString().padStart(2, '0');
            } else {
                volContainer.style.display = "none";
            }

            const titleInput = document.getElementById('in-title').value;
            const quoteInput = document.getElementById('in-quote').value;
            
            const titleEl = document.getElementById('out-title');
            const titleLine = document.getElementById('title-line');
            const mainRows = document.getElementById('main-rows');
            const quoteBox = document.getElementById('quote-box');
            
            let activePoints = 0;
            for (let i = 1; i <= 3; i++) {
                const val = document.getElementById('in-p' + i).value;
                const row = document.getElementById(`row${i}`);
                if (val) {
                    activePoints++;
                    let title = '', content = '';
                    if (val.includes('|')) [title, content] = val.split('|');
                    else if (val.includes('：')) { const parts = val.split('：'); title = parts[0]; content = parts.slice(1).join('：'); }
                    else if (val.includes(':')) { const parts = val.split(':'); title = parts[0]; content = parts.slice(1).join(':'); }
                    else { title = `重點 ${i}`; content = val; }
                    
                    document.getElementById(`out-p${i}t`).innerText = title.trim();
                    document.getElementById(`out-p${i}c`).innerText = content.trim();
                    row.style.display = "flex";
                } else { 
                    row.style.display = "none";
                }
            }

            if (quoteInput) {
                document.getElementById('out-quote').innerText = `"${quoteInput}"`;
                quoteBox.style.display = 'flex';
            } else {
                quoteBox.style.display = 'none';
            }

            if (activePoints === 0 && (!titleInput || titleInput.trim() === "")) {
                // 🎯 模式 3：結尾純金句模式 (Outro Mode)
                titleEl.style.display = 'none';
                titleLine.style.display = 'none';
                mainRows.style.display = 'none';
                
                quoteBox.style.minHeight = '450px'; 
                quoteBox.style.marginBottom = 'auto'; 
                document.getElementById('out-quote').style.fontSize = '28px';
                
            } else if (activePoints > 0) {
                // 🎯 模式 2：內容模式 (Content Mode)
                titleEl.style.display = 'block';
                titleEl.innerText = titleInput || "核心重點";
                titleEl.style.fontSize = '38px';
                titleEl.style.marginTop = '0px';
                titleEl.style.textAlign = 'left';
                
                titleLine.style.display = 'block';
                mainRows.style.display = 'flex';
                
                quoteBox.style.minHeight = 'auto';
                quoteBox.style.marginBottom = '0px'; 
                document.getElementById('out-quote').style.fontSize = '20px';
                
            } else {
                // 🎯 模式 1：封面模式 (Cover Mode)
                titleEl.style.display = 'block';
                titleEl.innerText = titleInput || "等待內容中...";
                titleEl.style.fontSize = '62px'; 
                titleEl.style.marginTop = '180px'; // ✨ 因為下方沒金句了，所以恢復大標題完美垂直置中
                titleEl.style.textAlign = 'center';
                
                titleLine.style.display = 'none';
                mainRows.style.display = 'none';
            }
        }

        async function downloadImage() {
            const node = document.getElementById('poster-card');
            const vol = document.getElementById('in-no-num').value;
            const page = document.getElementById('in-curr-page').value;
            
            localStorage.setItem('sc_last_no', vol); 

            try {
                await document.fonts.ready;
                const realHeight = node.offsetHeight;
                const dataUrl = await htmlToImage.toPng(node, { 
                    pixelRatio: 3, 
                    backgroundColor: '#fdfbf7',
                    width: 720,
                    height: realHeight, 
                    style: { transform: 'none', margin: '0' }
                });
                const link = document.createElement('a');
                
                let suffix = `P${page}`;
                if (page == 1) suffix = "Cover";
                else if (page == document.getElementById('in-total-page').value) suffix = "Outro";
                
                link.download = `Slide-Vol${vol}-${suffix}.png`;
                link.href = dataUrl; 
                link.click();
                
                await new Promise(r => setTimeout(r, 500)); 
            } catch (err) { 
                alert('圖片產生出錯，請確認瀏覽器支援 html-to-image 套件。'); 
                console.error(err);
            }
        }

        async function prevPage() {
            if (aiSlidesData.length > 0) {
                if (currentAiIndex > 0) {
                    currentAiIndex--;
                    loadSlideToUI(currentAiIndex);
                } else {
                    alert("這已經是第一頁囉！");
                }
            } else {
                let curr = parseInt(document.getElementById('in-curr-page').value);
                if (curr > 1) { 
                    document.getElementById('in-curr-page').value = curr - 1; 
                    sync(); 
                }
            }
        }

        async function nextPage() {
            if (aiSlidesData.length > 0) {
                if (currentAiIndex < aiSlidesData.length - 1) {
                    currentAiIndex++;
                    loadSlideToUI(currentAiIndex);
                } else {
                    alert("🎉 已經到最後一頁囉！");
                }
            } else {
                let curr = parseInt(document.getElementById('in-curr-page').value);
                let total = parseInt(document.getElementById('in-total-page').value);
                if (curr < total) { 
                    document.getElementById('in-curr-page').value = curr + 1; 
                    sync(); 
                }
            }
        }
    </script>
</body>
</html>
