<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&C Coach 專業圖卡產生器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3d5a4b', secondary: '#c59d5f', bglight: '#fdfbf7' },
                    fontFamily: { serif: ['"Noto Serif TC"', 'serif'], sans: ['"Noto Sans TC"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #e2e8f0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; }
        /* 4:5 比例設定 */
        #poster-card { width: 720px; min-height: 900px; background-color: #fdfbf7; position: relative; }
        .point-row { display: flex; align-items: flex-start; gap: 1.5rem; }
        .number-box { 
            flex-shrink: 0; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            background-color: #3d5a4b; color: #fdfbf7; font-weight: 800; border-radius: 0px; line-height: 1; margin-top: 4px;
        }
        /* 手機版縮放預覽 */
        @media (max-width: 768px) {
            #poster-card { transform: scale(0.5); transform-origin: top center; margin-bottom: -450px; }
            .editor-container { width: 95% !important; }
        }
    </style>
</head>
<body>

    <div class="editor-container mt-6 mb-10 w-full max-w-[720px] bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
        <div class="bg-primary p-4 text-white flex justify-between items-center cursor-pointer" onclick="toggleEditor()">
            <h2 class="font-bold flex items-center gap-2">🏋️ 教練專屬內容編輯器</h2>
            <span id="editor-toggle">▼ 收合面板</span>
        </div>
        
        <div id="editor-body" class="p-6 space-y-5 transition-all">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">分類標籤</label>
                    <select id="in-tag" onchange="sync()" class="w-full mt-1 p-2 border rounded-lg outline-none text-sm font-bold text-primary">
                        <option value="GOLF PERFORMANCE">高爾夫專項表現</option>
                        <option value="STRENGTH SCIENCE">肌力科學實證</option>
                        <option value="COACH'S NOTE">教練訓練日誌</option>
                        <option value="BIOMECHANICS">生物力學分析</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">期數編號</label>
                    <input id="in-no" type="text" oninput="sync()" class="w-full mt-1 p-2 border rounded-lg outline-none text-sm" value="VOL. 01">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">核心標題 (可用 &lt;br&gt; 換行)</label>
                <input id="in-title" type="text" oninput="sync()" class="w-full mt-1 p-3 border rounded-xl outline-none focus:border-secondary font-serif font-bold" value="高爾夫揮桿速度：<br>旋轉爆發力的科學">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">專業要點 (標題|敘述)</label>
                <input id="in-p1" type="text" oninput="sync()" class="w-full p-3 border rounded-xl outline-none text-sm" placeholder="重點1|描述內容">
                <input id="in-p2" type="text" oninput="sync()" class="w-full p-3 border rounded-xl outline-none text-sm" placeholder="重點2|描述內容">
                <input id="in-p3" type="text" oninput="sync()" class="w-full p-3 border rounded-xl outline-none text-sm" placeholder="重點3|描述內容">
            </div>

            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">IG 帳號名稱</label>
                <input id="in-ig" type="text" oninput="sync()" class="w-full mt-1 p-2 border rounded-lg outline-none text-sm" value="JoeYou501">
            </div>

            <button onclick="downloadImage()" class="w-full bg-secondary text-white py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">
                🚀 生成 3x 高清繁體圖卡
            </button>
        </div>
    </div>

    <div id="poster-card" class="p-14 flex flex-col border-t-[14px] border-primary relative">
        
        <header class="mb-14 relative z-10">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <div class="h-4 w-1 bg-secondary"></div>
                    <span id="out-tag" class="font-sans text-primary tracking-[0.4em] text-[12px] font-black uppercase">GOLF PERFORMANCE</span>
                </div>
                <span id="out-no" class="font-sans text-secondary/50 text-[10px] font-bold tracking-widest">VOL. 01</span>
            </div>
            <h1 id="out-title" class="font-serif text-primary text-[44px] font-black leading-[1.2] mb-6">高爾夫揮桿速度：<br>旋轉爆發力的科學</h1>
            <div class="w-16 h-1 bg-secondary/30 mb-6"></div>
        </header>

        <main class="flex-grow space-y-12 relative z-10">
            <div class="point-row">
                <div class="number-box">01</div>
                <div>
                    <h3 id="out-p1t" class="font-serif text-[22px] font-bold text-primary mb-2">請輸入重點標題</h3>
                    <p id="out-p1c" class="font-sans text-primary/80 text-[17px] leading-relaxed max-w-[480px]">請在上方輸入框使用「標題|內容」格式填寫。</p>
                </div>
            </div>
            <div class="point-row">
                <div class="number-box">02</div>
                <div>
                    <h3 id="out-p2t" class="font-serif text-[22px] font-bold text-primary mb-2">科學化監控</h3>
                    <p id="out-p2c" class="font-sans text-primary/80 text-[17px] leading-relaxed max-w-[480px]">透過數據分析，精準掌握訓練負荷與進度。</p>
                </div>
            </div>
            <div class="point-row">
                <div class="number-box">03</div>
                <div>
                    <h3 id="out-p3t" class="font-serif text-[22px] font-bold text-primary mb-2">專向爆發力</h3>
                    <p id="out-p3c" class="font-sans text-primary/80 text-[17px] leading-relaxed max-w-[480px]">結合肌力與技術，將體能轉化為賽場表現。</p>
                </div>
            </div>
        </main>

        <footer class="mt-16 flex flex-col gap-8 relative z-10">
            <div class="border-y border-primary/10 py-6 text-center">
                <p id="out-quote" class="font-serif text-primary/90 text-xl font-bold italic leading-relaxed">
                    「訓練不只是汗水，更是對身體極限的精準雕琢。」
                </p>
            </div>
            
            <div class="flex justify-between items-center px-2">
                <span class="font-sans text-[9px] tracking-[0.5em] text-primary/30 uppercase font-black">Professional S&C Coaching</span>
                <div class="flex items-center gap-2.5 border-b-2 border-secondary/20 pb-1.5">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c59d5f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line>
                    </svg>
                    <span id="out-ig" class="font-serif text-secondary text-base font-black tracking-wider">Coach_YourID</span>
                </div>
            </div>
        </footer>
    </div>

    <script>
        function toggleEditor() {
            const body = document.getElementById('editor-body');
            const toggle = document.getElementById('editor-toggle');
            body.classList.toggle('hidden');
            toggle.innerText = body.classList.contains('hidden') ? "▲ 展開編輯" : "▼ 收合面板";
        }

        function sync() {
            document.getElementById('out-tag').innerText = document.getElementById('in-tag').value;
            document.getElementById('out-no').innerText = document.getElementById('in-no').value;
            document.getElementById('out-title').innerHTML = document.getElementById('in-title').value;
            document.getElementById('out-ig').innerText = document.getElementById('in-ig').value;
            
            for(let i=1; i<=3; i++) {
                const input = document.getElementById('in-p' + i).value;
                if(input.includes('|')) {
                    const parts = input.split('|');
                    document.getElementById('out-p' + i + 't').innerText = parts[0];
                    document.getElementById('out-p' + i + 'c').innerText = parts[1];
                }
            }
        }

        async function downloadImage() {
            const node = document.getElementById('poster-card');
            try {
                await document.fonts.ready;
                const dataUrl = await htmlToImage.toPng(node, { pixelRatio: 3, backgroundColor: '#fdfbf7' });
                const link = document.createElement('a');
                link.download = `CoachLog-TW-${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
            } catch (err) { alert('下載失敗，請重新整理頁面'); }
        }
        sync();
    </script>
</body>
</html>
